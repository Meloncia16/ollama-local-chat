<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --p:#5b4cf5;--p2:#7c6ff7;--ph:#ede9ff;--pb:#c4b8f8;
  --bg:#f8f7ff;--bg1:#ffffff;--bg2:#fafafa;
  --b1:#e8e6f0;--b2:#d4d0f0;
  --tx:#1a1535;--t2:#5f5a7d;--t3:#9d99b8;
  --gn:#16a34a;--gd:#dcfce7;--gdb:#bbf7d0;
  --rd:#dc2626;
  --f:'Plus Jakarta Sans',sans-serif;--m:'JetBrains Mono',monospace;
  --r:12px;--r2:9px;
  --sh:0 1px 3px rgba(91,76,245,.06),0 4px 14px rgba(91,76,245,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f);background:var(--bg);color:var(--tx);display:flex;font-size:14px}

/* ── SIDEBAR ── */
#sidebar{
  width:248px;min-width:248px;
  background:var(--bg1);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  height:100vh;
  box-shadow:2px 0 12px rgba(91,76,245,.04);
}
#logo{
  padding:18px 18px 16px;
  font-size:15px;font-weight:800;
  color:var(--p);
  border-bottom:1px solid var(--b1);
  letter-spacing:-.03em;
  display:flex;align-items:center;gap:8px;
}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--p);box-shadow:0 0 0 3px var(--ph)}

/* sections */
.sb-sec{padding:12px 14px;border-bottom:1px solid var(--b1)}
.sb-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;font-weight:700}

/* inputs */
#url-input,#model-select,#sysprompt{
  width:100%;padding:8px 11px;
  border:1px solid var(--b1);border-radius:8px;
  font-size:12px;font-family:var(--m);
  color:var(--tx);background:var(--bg);
  outline:none;transition:border-color .15s;
}
#url-input:focus,#model-select:focus,#sysprompt:focus{border-color:var(--pb)}
#model-select{font-family:var(--f);font-size:13px}
#sysprompt{font-family:var(--f);font-size:12px;resize:vertical;min-height:56px;line-height:1.5}

/* connect button */
#connect-btn{
  margin-top:8px;width:100%;
  padding:9px;background:var(--p);color:#fff;
  border:none;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--f);transition:all .15s;
  box-shadow:0 3px 10px rgba(91,76,245,.3);
}
#connect-btn:hover{background:var(--p2);box-shadow:0 4px 14px rgba(91,76,245,.4)}

/* params sliders */
.pl{font-size:11px;color:var(--t2);display:flex;justify-content:space-between;margin-bottom:3px;font-weight:500}
input[type=range]{width:100%;accent-color:var(--p);margin-bottom:11px;cursor:pointer}

/* history */
#history{flex:1;overflow-y:auto;padding:8px 10px}
.sb-hist-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:4px 6px 8px;font-weight:700}
.hi{
  padding:8px 10px;border-radius:9px;cursor:pointer;
  margin-bottom:2px;font-size:13px;color:var(--t2);
  border:1px solid transparent;
  display:flex;justify-content:space-between;align-items:flex-start;
  transition:all .15s;
}
.hi:hover{background:var(--bg);border-color:var(--b1);color:var(--tx)}
.hi.active{background:var(--ph);border-color:var(--pb);color:var(--p);font-weight:600}
.hi-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.hi-cnt{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--m)}
.hi-del{color:var(--t3);cursor:pointer;font-size:16px;line-height:1;display:none;flex-shrink:0;margin-left:4px;padding:0 2px}
.hi:hover .hi-del{display:block}
.hi-del:hover{color:var(--rd)}

/* new chat btn */
#new-conv-btn{
  margin:0 10px 4px;
  padding:9px 14px;background:var(--p);color:#fff;
  border:none;border-radius:9px;
  font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  font-family:var(--f);transition:all .15s;
  box-shadow:0 3px 10px rgba(91,76,245,.25);
  width:calc(100% - 20px);
}
#new-conv-btn:hover{background:var(--p2);transform:translateY(-1px)}

/* status */
#status{
  padding:10px 14px;border-top:1px solid var(--b1);
  font-size:11px;color:var(--t2);
  display:flex;align-items:center;gap:7px;
  background:var(--bg2);font-weight:500;
}
#dot{width:7px;height:7px;border-radius:50%;background:var(--rd);flex-shrink:0;transition:background .3s}
#dot.on{background:var(--gn);box-shadow:0 0 0 2px var(--gd)}

/* ── MAIN AREA ── */
#main{
  flex:1;display:flex;flex-direction:column;
  min-width:0;height:100vh;overflow:hidden;
  background:var(--bg);
}

/* header */
#chat-hdr{
  padding:14px 24px;
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg1);
  flex-shrink:0;
  box-shadow:0 1px 0 var(--b1);
}
#chat-title{
  font-size:14px;font-weight:700;
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  margin-right:14px;color:var(--tx);
}
#hdr-btns{display:flex;gap:7px}
.hbtn{
  padding:7px 14px;border:1px solid var(--b1);
  border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;background:var(--bg1);color:var(--t2);
  transition:all .15s;font-family:var(--f);
}
.hbtn:hover{border-color:var(--pb);color:var(--p);background:var(--ph)}
.hbtn.pri{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 2px 8px rgba(91,76,245,.3)}
.hbtn.pri:hover{background:var(--p2)}

/* messages area — fills all space between header and input */
#msgs{
  flex:1;
  overflow-y:auto;
  padding:28px 0 16px;
  min-height:0;
}
#msgs-inner{
  max-width:760px;
  margin:0 auto;
  padding:0 28px;
}

/* empty state */
#empty{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:340px;gap:10px;
  color:var(--t3);text-align:center;
  padding:40px 20px;
}
#empty .emp-ico{font-size:42px;margin-bottom:8px;opacity:.6}
#empty h2{font-size:22px;font-weight:800;color:var(--t2);letter-spacing:-.04em}
#empty p{font-size:13px;color:var(--t3)}

/* message bubbles */
.mwrap{margin-bottom:22px;display:flex}
.mwrap.user{justify-content:flex-end}
.mwrap.assistant{justify-content:flex-start}
.mbub{
  max-width:78%;padding:12px 16px;
  border-radius:16px;line-height:1.7;
  font-size:14px;word-break:break-word;
}
.mwrap.user .mbub{
  background:var(--ph);
  border:1px solid var(--pb);
  border-bottom-right-radius:4px;
  color:var(--tx);
}
.mwrap.assistant .mbub{
  background:var(--bg1);
  border:1px solid var(--b1);
  border-bottom-left-radius:4px;
  color:var(--tx);
  box-shadow:var(--sh);
}
.mmeta{font-size:11px;color:var(--t3);margin-top:6px;display:flex;gap:10px;font-weight:500}
.mwrap.user .mmeta{justify-content:flex-end}
.cpy{cursor:pointer;transition:color .15s}.cpy:hover{color:var(--p)}
.edt{cursor:pointer;transition:color .15s}.edt:hover{color:var(--p)}

/* edit mode */
.edit-box{width:100%;padding:9px 12px;border:1.5px solid var(--pb);border-radius:10px;font-family:var(--f);font-size:14px;color:var(--tx);background:var(--bg1);outline:none;resize:none;line-height:1.55;min-height:60px}
.edit-actions{display:flex;gap:7px;margin-top:7px;justify-content:flex-end}
.ea-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--f);transition:all .15s;border:1px solid var(--b1)}
.ea-save{background:var(--p);color:#fff;border-color:var(--p)}.ea-save:hover{background:var(--p2)}
.ea-cancel{background:var(--bg);color:var(--t2)}.ea-cancel:hover{border-color:var(--pb);color:var(--p)}

/* typing dots */
.dots{display:flex;gap:5px;padding:4px 2px;align-items:center}
.dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--t3);animation:blink 1.4s infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* code blocks */
.code-block{background:var(--bg2);border:1px solid var(--b1);border-radius:10px;margin:10px 0;overflow:hidden}
.code-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;background:var(--bg);border-bottom:1px solid var(--b1)}
.code-lang{font-size:11px;color:var(--t3);font-family:var(--m);font-weight:600}
.code-cpy{font-size:11px;color:var(--t2);cursor:pointer;background:none;border:none;font-weight:600;transition:color .15s;font-family:var(--f)}
.code-cpy:hover{color:var(--p)}
.code-block pre{padding:14px;overflow-x:auto;font-family:var(--m);font-size:12.5px;line-height:1.65;color:var(--tx)}

/* input area — always at bottom */
#input-area{
  padding:12px 24px 18px;
  border-top:1px solid var(--b1);
  background:var(--bg1);
  flex-shrink:0;
}
#input-box{
  max-width:760px;margin:0 auto;
  background:var(--bg1);
  border:1.5px solid var(--b1);
  border-radius:16px;overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
  box-shadow:0 1px 6px rgba(91,76,245,.06);
}
#input-box:focus-within{border-color:var(--pb);box-shadow:0 2px 12px rgba(91,76,245,.12)}
#fprev{display:flex;flex-wrap:wrap;gap:7px;padding:10px 14px 0}
.ap{position:relative;background:var(--bg);border:1px solid var(--b1);border-radius:8px;padding:5px 11px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px;font-weight:500}
.ap img{width:36px;height:36px;object-fit:cover;border-radius:5px}
.arm{position:absolute;top:-6px;right:-6px;width:17px;height:17px;background:var(--rd);color:#fff;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
#irow{display:flex;align-items:flex-end;padding:11px 13px;gap:9px}
#uinput{
  flex:1;background:transparent;border:none;
  color:var(--tx);font-family:var(--f);
  font-size:14px;resize:none;
  min-height:24px;max-height:160px;
  line-height:1.55;outline:none;
}
#uinput::placeholder{color:var(--t3)}
.ibtn{
  width:34px;height:34px;border-radius:9px;
  background:var(--bg);border:1px solid var(--b1);
  color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .15s;flex-shrink:0;
}
.ibtn:hover{border-color:var(--pb);color:var(--p);background:var(--ph)}
#sbtn{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 3px 10px rgba(91,76,245,.3)}
#sbtn:hover{background:var(--p2);box-shadow:0 4px 14px rgba(91,76,245,.4)}
#sbtn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
#hint{text-align:center;font-size:11px;color:var(--t3);margin-top:7px;max-width:760px;margin-left:auto;margin-right:auto;font-weight:500}

/* toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:#f8f7ff;padding:9px 20px;border-radius:99px;font-size:12px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:200;box-shadow:0 4px 20px rgba(91,76,245,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* markdown */
.md-h1{font-size:20px;font-weight:800;margin:16px 0 7px;color:var(--tx);letter-spacing:-.03em}
.md-h2{font-size:17px;font-weight:700;margin:13px 0 6px;color:var(--tx)}
.md-h3{font-size:15px;font-weight:700;margin:11px 0 5px;color:var(--tx)}
.md-h4{font-size:14px;font-weight:700;margin:9px 0 4px}
.md-ul,.md-ol{margin:7px 0 7px 22px;display:block}
.md-ul li,.md-ol li{margin-bottom:4px;line-height:1.65}
.md-bq{border-left:3px solid var(--p);padding:7px 14px;margin:9px 0;color:var(--t2);background:var(--ph);border-radius:0 8px 8px 0;font-style:italic}
.md-hr{border:none;border-top:1px solid var(--b1);margin:14px 0}
.md-table-wrap{overflow-x:auto;margin:11px 0}
.md-table{border-collapse:collapse;font-size:13px;width:100%}
.md-table th,.md-table td{border:1px solid var(--b1);padding:8px 13px;text-align:left}
.md-table th{background:var(--ph);font-weight:700;color:var(--tx)}
.md-table tr:nth-child(even) td{background:var(--bg2)}
.md-line{display:inline}
</style>
</head>
<body>

<div id="sidebar">
  <div id="logo">
    <div class="logo-dot"></div>
    Ollama Chat
  </div>

  <div class="sb-sec">
    <div class="sb-lbl">Ollama URL</div>
    <input id="url-input" placeholder="http://localhost:11434" value="http://localhost:11434">
    <button id="connect-btn">Connect & Load Models</button>
  </div>

  <div class="sb-sec">
    <div class="sb-lbl">Model</div>
    <select id="model-select"><option value="">— connect first —</option></select>
  </div>

  <div class="sb-sec">
    <div class="pl"><span>Temperature</span><span id="tv">0.7</span></div>
    <input type="range" id="temp" min="0" max="2" step="0.1" value="0.7">
    <div class="pl"><span>Max tokens</span><span id="mkv">2048</span></div>
    <input type="range" id="maxtok" min="128" max="8192" step="128" value="2048">
    <div class="pl" style="margin-bottom:5px"><span>System prompt</span></div>
    <textarea id="sysprompt" placeholder="You are a helpful assistant."></textarea>
  </div>

  <button id="new-conv-btn">
    <span style="font-size:18px;line-height:1">＋</span> New Chat
  </button>

  <div id="history">
    <div class="sb-hist-lbl">History</div>
    <div id="hlist"></div>
  </div>

  <div id="status"><div id="dot"></div><span id="stxt">Not connected</span></div>
</div>

<!-- ── MAIN CHAT AREA ── -->
<div id="main">

  <div id="chat-hdr">
    <div id="chat-title">New conversation</div>
    <div id="hdr-btns">
      <button class="hbtn" id="export-btn">↓ Export</button>
      <button class="hbtn" id="share-btn">🔗 Share</button>
      <button class="hbtn" id="clear-btn">✕ Clear</button>
    </div>
  </div>

  <!-- Messages — fills all available vertical space -->
  <div id="msgs">
    <div id="msgs-inner">
      <div id="empty">
        <div class="emp-ico">🤖</div>
        <h2>Start chatting</h2>
        <p>Connect to Ollama, pick a model, and go!</p>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div id="input-area">
    <div id="input-box">
      <div id="fprev"></div>
      <div id="irow">
        <button class="ibtn" id="attach-btn">📎</button>
        <input type="file" id="file-inp" multiple accept="image/*,.pdf,.txt,.md,.json,.csv,.py,.js,.ts,.html,.css" style="display:none">
        <textarea id="uinput" rows="1" placeholder="Type a message… (Enter to send)"></textarea>
        <button class="ibtn" id="sbtn" disabled>➤</button>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
let sessions=[], currentId=null, attachments=[], sent=0, recv=0, turns=0;
try{sessions=JSON.parse(localStorage.getItem('oc_sessions')||'[]')}catch{}

function save(){try{localStorage.setItem('oc_sessions',JSON.stringify(sessions))}catch{}}
function cur(){return sessions.find(s=>s.id===currentId)}
function toast(m,d=2000){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function getUrl(){return document.getElementById('url-input').value.trim().replace(/\/$/,'')}
function getModel(){return document.getElementById('model-select').value}

// Connect
document.getElementById('connect-btn').addEventListener('click', loadModels);
document.getElementById('url-input').addEventListener('keydown', e=>{if(e.key==='Enter')loadModels()});

async function loadModels(){
  const url = getUrl();
  document.getElementById('stxt').textContent='Connecting…';
  document.getElementById('dot').className='';
  try{
    const r = await fetch(url+'/api/tags', {mode:'cors'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    const models = d.models||[];
    const sel = document.getElementById('model-select');
    if(!models.length){sel.innerHTML='<option>No models — run: ollama pull qwen2.5</option>';document.getElementById('stxt').textContent='No models';return}
    const prev=sel.value;
    sel.innerHTML=models.map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
    if(prev&&models.find(m=>m.name===prev))sel.value=prev;
    document.getElementById('dot').className='on';
    document.getElementById('stxt').textContent=models.length+' models ready';
    document.getElementById('sbtn').disabled=false;
    toast('Connected! '+models.length+' models loaded ✓');
  }catch(e){
    document.getElementById('stxt').textContent='Failed: '+e.message;
    toast('Cannot connect. Check URL and try again.',3000);
  }
}

// Sessions
function newSession(){
  const id=Date.now().toString();
  sessions.unshift({id,title:'New conversation',messages:[],created:Date.now()});
  currentId=id; sent=0;recv=0;turns=0;attachments=[];
  save();renderHistory();renderMsgs();updateTitle();updateStats();
}

function loadSession(id){
  currentId=id;const s=cur();
  sent=s.messages.filter(m=>m.role==='user').reduce((a,m)=>a+Math.ceil((m.content||'').length/4),0);
  recv=s.messages.filter(m=>m.role==='assistant').reduce((a,m)=>a+Math.ceil((m.content||'').length/4),0);
  turns=s.messages.filter(m=>m.role==='assistant').length;
  renderHistory();renderMsgs();updateTitle();updateStats();
}

function updateTitle(){
  const s=cur();
  document.getElementById('chat-title').textContent=s?s.title:'New conversation';
}

function updateStats(){ /* stats bar removed */ }

function renderHistory(){
  const list=document.getElementById('hlist');
  list.innerHTML='';
  if(!sessions.length){list.innerHTML='<div style="font-size:12px;color:var(--t3);padding:4px 8px">No conversations yet</div>';return}
  sessions.forEach(s=>{
    const d=document.createElement('div');
    d.className='hi'+(s.id===currentId?' active':'');
    d.innerHTML=`<div style="flex:1;min-width:0"><div class="hi-title">${esc(s.title)}</div><div class="hi-cnt">${s.messages.length} msgs</div></div><span class="hi-del">×</span>`;
    d.addEventListener('click',e=>{if(e.target.classList.contains('hi-del'))return;loadSession(s.id)});
    d.querySelector('.hi-del').addEventListener('click',e=>{e.stopPropagation();if(confirm('Delete?')){sessions=sessions.filter(x=>x.id!==s.id);if(currentId===s.id){currentId=null;renderMsgs();updateTitle()}save();renderHistory()}});
    list.appendChild(d);
  });
}

function renderMsgs(){
  const inner=document.getElementById('msgs-inner');
  const s=cur();
  if(!s||!s.messages.length){inner.innerHTML='<div id="empty"><div class="emp-ico">🤖</div><h2>Start chatting</h2><p>Connect to Ollama, pick a model, and go!</p></div>';return}
  inner.innerHTML='';
  s.messages.forEach((m,i)=>appendDOM(m,i));
  document.getElementById('msgs').scrollTop=99999;
}

function appendDOM(m,idx){
  const inner=document.getElementById('msgs-inner');
  const empty=document.getElementById('empty');
  if(empty)empty.remove();
  const wrap=document.createElement('div');
  wrap.className='mwrap '+m.role;
  let fhtml='';
  if(m.files&&m.files.length){
    fhtml='<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px">';
    m.files.forEach(f=>{
      if(f.type==='image'&&f.dataUrl)fhtml+=`<div style="background:var(--bg);border:1px solid var(--b1);border-radius:8px;padding:7px;display:flex;flex-direction:column;gap:4px"><img src="${f.dataUrl}" style="width:48px;height:48px;object-fit:cover;border-radius:6px"><span style="font-size:11px;color:var(--t3)">${esc(f.name)}</span></div>`;
      else fhtml+=`<div style="background:var(--bg);border:1px solid var(--b1);border-radius:8px;padding:6px 11px;font-size:12px;color:var(--t2);font-weight:500">📄 ${esc(f.name)}</div>`;
    });
    fhtml+='</div>';
  }
  const time=m.time?new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  const label=m.role==='user'?'You':(m.model||'Assistant');

  if(m.role==='user'){
    const editBtn=`<span class="edt" title="Edit">✎</span>`;
    const copyBtn=`<span class="cpy" onclick="navigator.clipboard.writeText(${JSON.stringify(m.content||'')}).then(()=>toast('Copied!'))">copy</span>`;
    wrap.innerHTML=`<div style="max-width:78%">${fhtml}<div class="mbub">${fmt(m.content||'')}</div><div class="mmeta"><span>${esc(label)} · ${time}</span><span style="display:flex;gap:10px">${editBtn}${copyBtn}</span></div></div>`;
    // attach edit handler
    wrap.querySelector('.edt').addEventListener('click',()=>startEdit(wrap,m,idx));
  } else {
    wrap.innerHTML=`<div style="max-width:78%">${fhtml}<div class="mbub">${fmt(m.content||'')}</div><div class="mmeta"><span>${esc(label)} · ${time}</span><span class="cpy" onclick="navigator.clipboard.writeText(${JSON.stringify(m.content||'')}).then(()=>toast('Copied!'))">copy</span></div></div>`;
  }

}

function startEdit(wrap,m,idx){
  const inner=wrap.querySelector('div');
  const origHTML=inner.innerHTML;
  const ta=document.createElement('textarea');
  ta.className='edit-box';
  ta.value=m.content||'';
  inner.innerHTML='';
  inner.appendChild(ta);
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,300)+'px';
  ta.focus();
  const acts=document.createElement('div');
  acts.className='edit-actions';
  acts.innerHTML='<button class="ea-btn ea-cancel">Cancel</button><button class="ea-btn ea-save">Save & Resend</button>';
  inner.appendChild(acts);
  acts.querySelector('.ea-cancel').addEventListener('click',()=>{inner.innerHTML=origHTML;wrap.querySelector('.edt').addEventListener('click',()=>startEdit(wrap,m,idx));});
  acts.querySelector('.ea-save').addEventListener('click',async()=>{
    const newText=ta.value.trim();
    if(!newText)return;
    const s=cur();
    // truncate conversation to this message (inclusive), update content
    m.content=newText;
    const msgIdx=s.messages.indexOf(m);
    if(msgIdx!==-1) s.messages=s.messages.slice(0,msgIdx+1);
    save();renderHistory();renderMsgs();
    // resend
    const inp=document.getElementById('uinput');
    inp.value='';
    await sendFromMessage(s,newText);
  });
}

document.getElementById('file-inp').addEventListener('change',async function(){

async function send(){
  const inp=document.getElementById('uinput');
  const txt=inp.value.trim();
  if(!txt&&!attachments.length) return;
  if(!getModel()){ toast('Pick a model first'); return; }

  if(!currentId) newSession();
  const s=cur();

  // Build content parts
  const apiContent=[];
  const fileMeta=[];
  for(const a of attachments){
    if(a.type==='image'){
      apiContent.push({type:'image_url',image_url:{url:`data:${a.mimeType};base64,${a.base64}`}});
      fileMeta.push({name:a.name,type:'image',dataUrl:a.dataUrl});
    } else {
      apiContent.push({type:'text',text:`File: ${a.name}\n\`\`\`\n${a.text}\n\`\`\``});
      fileMeta.push({name:a.name,type:'text'});
    }
  }
  if(txt) apiContent.push({type:'text',text:txt});

  const uMsg={role:'user',content:txt,files:fileMeta.length?fileMeta:undefined,time:Date.now()};
  s.messages.push(uMsg);
  sent+=Math.ceil(txt.length/4);
  if(s.title==='New conversation'&&txt.length>0) s.title=txt.slice(0,48)+(txt.length>48?'…':'');
  inp.value='';inp.style.height='auto';
  attachments=[];document.getElementById('fprev').innerHTML='';
  updateTitle();updateStats();save();renderHistory();
  appendDOM(uMsg);

  const inner=document.getElementById('msgs-inner');
  const typing=document.createElement('div');
  typing.className='mwrap assistant';typing.id='typing';
  typing.innerHTML='<div style="max-width:78%"><div class="mbub"><div class="dots"><span></span><span></span><span></span></div></div></div>';
  inner.appendChild(typing);
  document.getElementById('msgs').scrollTop=99999;
  document.getElementById('sbtn').disabled=true;

  const sys=document.getElementById('sysprompt').value.trim();
  const history=s.messages.slice(0,-1).map(m=>({role:m.role,content:m.content||''}));
  const payload={
    model:getModel(),
    messages:[...(sys?[{role:'system',content:sys}]:[]),...history,{role:'user',content:apiContent.length===1&&apiContent[0].type==='text'?apiContent[0].text:apiContent}],
    stream:true,
    temperature:parseFloat(document.getElementById('temp').value),
    max_tokens:parseInt(document.getElementById('maxtok').value)
  };

  const t0=Date.now();let rtok=0;
  try{
    const resp=await fetch(getUrl()+'/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    typing.remove();
    const aMsg={role:'assistant',content:'',model:getModel(),time:Date.now()};
    s.messages.push(aMsg);
    const aIdx=s.messages.length-1;
    const aw=document.createElement('div');aw.className='mwrap assistant';
    const awInner=document.createElement('div');awInner.style.maxWidth='78%';
    const ab=document.createElement('div');ab.className='mbub';
    awInner.appendChild(ab);aw.appendChild(awInner);inner.appendChild(aw);

    const reader=resp.body.getReader();const dec=new TextDecoder();let full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value,{stream:true}).split('\n')){
        const l=line.trim();
        if(!l||l==='data: [DONE]')continue;
        if(l.startsWith('data: ')){
          try{const d=JSON.parse(l.slice(6));const delta=d.choices?.[0]?.delta?.content||'';full+=delta;rtok+=Math.ceil(delta.length/4);ab.innerHTML=fmt(full);document.getElementById('msgs').scrollTop=99999}catch{}
        }
      }
    }
    const elapsed=(Date.now()-t0)/1000;
    aMsg.content=full;
    const meta=document.createElement('div');meta.className='mmeta';
    meta.innerHTML=`<span>${esc(getModel())} · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span><span class="cpy" onclick="navigator.clipboard.writeText(${JSON.stringify(full)}).then(()=>toast('Copied!'))">copy</span>`;
    awInner.appendChild(meta);
    save();renderHistory();
  }catch(e){
    typing.remove();
    const ew=document.createElement('div');ew.className='mwrap assistant';
    ew.innerHTML=`<div style="max-width:78%"><div class="mbub" style="color:var(--rd);border-color:#fca5a5;background:#fff5f5">⚠ ${esc(e.message)}</div></div>`;
    inner.appendChild(ew);
  }
  document.getElementById('sbtn').disabled=false;
  document.getElementById('uinput').focus();
}

// Markdown formatter
function fmt(rawText){
  if(!rawText) return '';
  let text = rawText.replace(/\\\\n/g,'\n');
  const codeBlocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const l = lang||'code';
    const idx = codeBlocks.length;
    codeBlocks.push(`<div class="code-block"><div class="code-hdr"><span class="code-lang">${l}</span><button class="code-cpy" onclick="navigator.clipboard.writeText(this.closest('.code-block').querySelector('pre').textContent).then(()=>{this.textContent='✓';setTimeout(()=>this.textContent='copy',1500)})">copy</button></div><pre>${esc(code.trim())}</pre></div>`);
    return `\x00CODE${idx}\x00`;
  });
  const inlineCodes = [];
  text = text.replace(/`([^`\n]+)`/g, (_, c) => {
    const idx = inlineCodes.length;
    inlineCodes.push(`<code style="background:var(--ph);padding:1px 6px;border-radius:5px;font-family:var(--m);font-size:12.5px;color:var(--p)">${esc(c)}</code>`);
    return `\x00INLINE${idx}\x00`;
  });
  const lines = text.split('\n');
  const out = [];
  let inList = false;
  let inOl = false;
  let inTable = false;
  let tableRows = [];
  function flushList(){if(inList){out.push('</ul>');inList=false;}if(inOl){out.push('</ol>');inOl=false;}}
  function flushTable(){
    if(!inTable) return;
    let thtml='<div class="md-table-wrap"><table class="md-table">';
    tableRows.forEach((row,ri)=>{
      const cells=row.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      thtml+='<tr>';
      cells.forEach(c=>{thtml+=ri===0?`<th>${c.trim()}</th>`:`<td>${c.trim()}</td>`;});
      thtml+='</tr>';
    });
    thtml+='</table></div>';
    out.push(thtml);
    inTable=false;tableRows=[];
  }
  for(const raw of lines){
    const line=raw;
    if(/^\|/.test(line)&&line.trim().endsWith('|')){
      if(/^[\s|:-]+$/.test(line.replace(/\|/g,''))){continue;}
      flushList();inTable=true;tableRows.push(line);continue;
    }
    if(inTable){flushTable();}
    if(/^#{1}\s/.test(line)){flushList();out.push(`<div class="md-h1">${inl(line.replace(/^#+\s/,''))}</div>`);continue;}
    if(/^#{2}\s/.test(line)){flushList();out.push(`<div class="md-h2">${inl(line.replace(/^#+\s/,''))}</div>`);continue;}
    if(/^#{3}\s/.test(line)){flushList();out.push(`<div class="md-h3">${inl(line.replace(/^#+\s/,''))}</div>`);continue;}
    if(/^#{4,}\s/.test(line)){flushList();out.push(`<div class="md-h4">${inl(line.replace(/^#+\s/,''))}</div>`);continue;}
    if(/^(\*|-)\s+/.test(line)){
      if(inOl){out.push('</ol>');inOl=false;}
      if(!inList){out.push('<ul class="md-ul">');inList=true;}
      out.push(`<li>${inl(line.replace(/^(\*|-)\s+/,''))}</li>`);continue;
    }
    if(/^\d+\.\s/.test(line)){
      if(inList){out.push('</ul>');inList=false;}
      if(!inOl){out.push('<ol class="md-ol">');inOl=true;}
      out.push(`<li>${inl(line.replace(/^\d+\.\s/,''))}</li>`);continue;
    }
    flushList();
    if(/^>\s/.test(line)){out.push(`<div class="md-bq">${inl(line.replace(/^>\s/,''))}</div>`);continue;}
    if(/^---+$/.test(line.trim())){out.push('<hr class="md-hr">');continue;}
    if(line.trim()===''){out.push('<div style="height:6px"></div>');continue;}
    out.push(`<div class="md-line">${inl(line)}</div><br>`);
  }
  flushList();flushTable();
  let result=out.join('');
  result=result.replace(/\x00CODE(\d+)\x00/g,(_,i)=>codeBlocks[+i]);
  result=result.replace(/\x00INLINE(\d+)\x00/g,(_,i)=>inlineCodes[+i]);
  return result;
}
function inl(t){
  return t
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--p);text-decoration:underline">$1</a>');
}
